<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Workshop Banco Guayaquil — Guía para participantes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #004A98; --brand-accent: #0078D4; --brand-dark: #002347;
      --bg: #FFF; --bg-light: #F6F6F6; --bg-card: #F6F6F6;
      --text: #002347; --text2: #6F6F6F; --text3: #999; --ok: #004A98;
      --border: #E8E8E8; --border2: #D4D4D4; --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
    .topbar { background:#FFF; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200; }
    .topbar-inner { max-width:1280px; margin:0 auto; padding:12px 32px; display:flex; align-items:center; justify-content:space-between; }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .brand-wordmark { font-size:20px; font-weight:700; color:var(--brand-primary); letter-spacing:-0.03em; max-width:220px; }
    .topbar-logo { cursor:pointer; }
    .topbar-nav { display:flex; gap:28px; margin-left:24px; }
    .topbar-nav a { font-size:14px; font-weight:500; color:var(--text); text-decoration:none; padding:4px 0; border-bottom:2px solid transparent; }
    .topbar-nav a.active { border-bottom-color:var(--brand-primary); font-weight:700; }
    .btn-enter { background:transparent; border:2px solid var(--brand-dark); color:var(--brand-dark); padding:10px 28px; border-radius:24px; font:inherit; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-enter:hover { background:var(--brand-dark); color:#FFF; }
    .static-banner { background:#E8F4FC; border-bottom:1px solid #B6D9F0; color:#002347; font-size:13px; padding:10px 32px; text-align:center; }
    .cat-strip { background:#FFF; border-bottom:1px solid var(--border); overflow-x:auto; }
    .cat-strip-inner { max-width:1280px; margin:0 auto; padding:16px 32px 0; display:flex; justify-content:center; gap:40px; }
    .cat-item { display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:12px; border-bottom:3px solid transparent; min-width:80px; transition:border-color .2s; }
    .cat-item:not(.disabled) { cursor:pointer; }
    .cat-item.active { border-bottom-color:var(--brand-primary); }
    .cat-item.disabled { opacity:.4; cursor:not-allowed; }
    .cat-item.disabled .cat-label { color:var(--text3); }
    .cat-icon img { height:36px; width:auto; }
    .cat-item.disabled .cat-icon img { filter:grayscale(1); }
    .cat-label { font-size:13px; font-weight:600; color:var(--text); text-align:center; white-space:nowrap; }
    .cat-badge { font-size:9px; font-weight:700; color:#FFF; background:var(--text3); border-radius:8px; padding:2px 7px; margin-top:-2px; }
    .container { max-width:1280px; margin:0 auto; padding:32px 32px 64px; }
    .section-title { font-size:28px; font-weight:700; margin-bottom:24px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
    @media (max-width:900px) { .grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:520px) { .grid { grid-template-columns:1fr; } }
    .card { background:var(--bg-card); border-radius:var(--radius); cursor:pointer; overflow:hidden; border:1px solid transparent; display:flex; flex-direction:column; }
    .card:hover { box-shadow:0 4px 20px rgba(0,0,0,.08); border-color:var(--border); transform:translateY(-2px); }
    .card-img { height:210px; display:flex; align-items:center; justify-content:center; padding:16px 24px; position:relative; }
    .card-img img { height:100%; width:100%; object-fit:contain; }
    .card-badge { position:absolute; top:12px; right:12px; background:#FFF; border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; color:var(--text2); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .card-info { padding:16px 20px 20px; }
    .card-name { font-size:16px; font-weight:700; margin-bottom:4px; }
    .card-sub { font-size:13px; color:var(--text2); line-height:1.4; }
    .card-meta-row { display:flex; gap:12px; margin-top:10px; font-size:12px; color:var(--text3); }
    /* scroll-margin: al cambiar de paso, scrollIntoView alinea bajo el banner + topbar sticky */
    .track-header-bar { background:#FFF; border-bottom:1px solid var(--border); padding:16px 0; scroll-margin-top: 96px; }
    .track-header-inner { max-width:1280px; margin:0 auto; padding:0 32px; display:flex; align-items:center; justify-content:space-between; }
    .track-title-group { display:flex; align-items:center; gap:14px; }
    .track-title-group .icon { font-size:32px; }
    .track-title-group h2 { font-size:22px; font-weight:700; }
    .track-title-group .sub { font-size:14px; color:var(--text2); font-weight:500; }
    .btn-back { background:transparent; border:2px solid var(--border2); color:var(--text2); padding:8px 18px; border-radius:24px; cursor:pointer; font:inherit; font-size:13px; font-weight:600; }
    .progress { margin-bottom:20px; }
    .progress-top { display:flex; justify-content:space-between; font-size:13px; color:var(--text2); margin-bottom:8px; }
    .progress-bar { width:100%; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:2px; transition:width .4s; }
    .pills { display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:4px; }
    .pill { min-width:38px; height:38px; border-radius:10px; border:2px solid var(--border); background:#FFF; color:var(--text3); font:inherit; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .pill.done { background:#E8F5E9; color:var(--ok); border-color:#C8E6C9; }
    .step { background:#FFF; border:1px solid var(--border); border-radius:var(--radius); padding:28px; margin-bottom:16px; }
    .step.completed { border-color:#A5D6A7; background:#FAFFF9; }
    .step-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .step-num { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .step-title { font-size:17px; font-weight:700; }
    .step-check { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); cursor:pointer; white-space:nowrap; }
    .step-desc { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:16px; }
    .prompt-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .prompt-label span { font-size:11px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .btn-copy { background:var(--brand-accent); color:#FFF; border:none; padding:6px 14px; border-radius:20px; cursor:pointer; font:inherit; font-size:12px; font-weight:600; }
    .btn-copy.copied { background:var(--ok); }
    .prompt-box { background:var(--bg-light); border:1px solid var(--border); border-radius:8px; padding:16px 18px; font-family:'DM Mono',monospace; font-size:13px; line-height:1.7; white-space:pre-wrap; word-break:break-word; max-height:320px; overflow-y:auto; }
    .expected { background:#F1F8E9; border:1px solid #DCEDC8; border-radius:8px; padding:12px 16px; margin-top:16px; }
    .expected-label { font-size:11px; color:var(--ok); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .expected-text { font-size:13px; color:var(--text2); line-height:1.6; margin-top:4px; }
    .warning { background:#FFF8E1; border:1px solid #FFE082; border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:#F57F17; }
    .tips { margin-top:14px; }
    .tip { font-size:13px; color:var(--text2); line-height:1.6; padding-left:14px; border-left:3px solid var(--border); margin-bottom:8px; }
    .nav-btns { display:flex; justify-content:space-between; margin-top:20px; }
    .btn-nav { padding:12px 24px; border-radius:24px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-prev { background:transparent; border:2px solid var(--border2); color:var(--text2); }
    .btn-prev:disabled { color:var(--text3); border-color:var(--border); cursor:default; }
    .btn-next { border:none; color:#FFF; font-weight:700; }
    .btn-next:disabled { background:var(--border)!important; color:var(--text3); cursor:default; }
    .faq { margin-top:36px; }
    .faq h3 { font-size:18px; font-weight:700; margin-bottom:14px; }
    .faq-item { background:var(--bg-light); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; }
    .faq-q { width:100%; text-align:left; padding:14px 18px; background:transparent; border:none; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font:inherit; font-size:14px; font-weight:600; color:var(--text); }
    .faq-a { padding:0 18px 14px; font-size:13px; color:var(--text2); line-height:1.7; display:none; }
    .faq-item.open .faq-a { display:block; }
    .faq-item.open .faq-toggle { transform:rotate(45deg); }
    .faq-toggle { color:var(--text3); font-size:20px; transition:transform .2s; }
    .brand-footer { background:var(--brand-dark); color:#FFF; padding:32px; text-align:center; font-size:13px; margin-top:48px; }

  </style>
</head>

  <script type="application/json" id="ws-embedded-tracks">{"tracks": [{"id": "data-engineering", "title": "Data Engineering", "subtitle": "Acelera tus pipelines bancarios con Genie Code", "description": "Un solo catálogo `workshop` y medallón **bronze / silver / gold**: el camino Genie llena transacciones desde CSV; el SDP llena marketplace desde JSON (`marketplace_*` en cada capa). Cada uno puede ejecutarse solo o ambos.", "icon": "⚙️", "color": "#FF6D00", "estimatedMinutes": 105, "participantCount": 0, "steps": [{"id": "eng-step-1", "stepNumber": 1, "title": "Explora tu landscape de datos", "description": "Abre un notebook nuevo y activa Genie Code (botón ✨ arriba a la derecha). Usa el siguiente prompt para explorar las tablas del workshop.", "prompt": "Muéstrame todas las tablas disponibles en el catálogo workshop, schema gold. Para cada tabla muéstrame:\n1. Nombre de la tabla\n2. Número de filas\n3. Lista de columnas con sus tipos de datos\n4. 3 filas de ejemplo\n\nFormatea todo como tablas legibles.", "expectedOutput": "Una o más celdas con tablas en `workshop.gold` (núcleo + marketplace + `fact_transacciones_mensual_genie`) y, si el pipeline SDP ya corrió, también objetos en `workshop.bronze` y `workshop.silver` (`marketplace_*`).", "tips": ["Si Genie Code no responde, verifica que tienes un cluster activo asignado al notebook.", "Si no ves las tablas, avisa al facilitador — necesitas permisos USE CATALOG y SELECT en workshop.gold.", "El facilitador ejecutó `generate_workshop_data.py`: además de `gold.*`, existe un CSV en `/Volumes/workshop/ingest/raw/transacciones_core/transacciones_nuevas.csv` (export de `fact_transacciones`) para el paso 2 de medallión.", "El módulo Lakeflow SDP (`sdp-workshop/`) ingiere JSON en `ingest/raw` y escribe en **bronze, silver y gold** con prefijos `marketplace_*` / `fact_marketplace_*` / `dim_marketplace_*`. Si no has corrido el pipeline, esas tablas SDP aún no existen."], "warningNote": null}, {"id": "eng-step-2", "stepNumber": 2, "title": "Pipeline medallion para ingesta de transacciones (CSV real del workshop)", "description": "Simula el archivo diario del core: ese CSV ya fue generado a partir de `workshop.gold.fact_transacciones` (mismas columnas y defectos de calidad). La tabla gold del camino Genie (`fact_transacciones_mensual_genie`) la crea el facilitador vacía; al ejecutar tu pipeline queda el agregado mensual en el **mismo esquema `gold`** que el resto del workshop.", "prompt": "Genera un pipeline PySpark completo para ingestar transacciones financieras desde un CSV. El pipeline debe seguir la arquitectura medallion:\n\n1. **Bronze**: Lee el CSV desde `/Volumes/workshop/ingest/raw/transacciones_core/transacciones_nuevas.csv` con `spark.read.option('header', true).csv(...)` y schema inference. Guárdalo como tabla Delta en `workshop.bronze.transacciones_raw` con modo overwrite.\n\n2. **Silver**: Lee la tabla bronze. Aplica estas transformaciones:\n   - Elimina duplicados por transaction_id\n   - Filtra registros con amount <= 0 o NULL\n   - Convierte transaction_date a tipo DATE\n   - Estandariza transaction_type a Title Case\n   - Normaliza channel a mayúsculas\n   Guarda en `workshop.silver.transacciones_clean`.\n\n3. **Gold**: Lee la tabla silver. Calcula por customer_id y mes:\n   - total_transactions: conteo de transacciones\n   - total_amount: suma de amount\n   - avg_ticket: promedio de amount\n   - top_channel: canal más frecuente (usa mode)\n   Guarda en `workshop.gold.fact_transacciones_mensual_genie` (si ya existe, usa overwrite).\n\nIncluye TBLPROPERTIES con 'layer', 'domain' = 'payments', y 'classification' = 'confidential' en cada tabla. Habilita Change Data Feed.\n\nAl final, agrega una celda que compare conteos entre `workshop.gold.fact_transacciones` y `workshop.silver.transacciones_clean` (deberían ser muy cercanos salvo filtros de calidad).", "expectedOutput": "3 celdas de código PySpark + comparación de conteos. El CSV existe tras el setup del facilitador; si falla la lectura, revisa permisos READ FILES sobre el volumen `workshop.ingest.raw`.", "tips": ["Genie Code sirve para iterar rápido; el mismo flujo de negocio lo puedes implementar después como Lakeflow SDP declarativo (ver módulo `sdp-workshop/` en el repo).", "El campo 'classification' = 'confidential' en TBLPROPERTIES etiqueta sensibilidad en Unity Catalog.", "Si quieres experimentar más con Genie sin tocar tablas: pide variantes (partitioning, ZORDER, checks extra) sobre el mismo CSV."], "warningNote": null}, {"id": "eng-step-3", "stepNumber": 3, "title": "Reconcilia core bancario vs. DWH", "description": "Uno de los retos más comunes en banca es validar que los datos del core bancario llegaron completos al DWH. Usa Genie Code para generar el código de reconciliación.", "prompt": "Escribe un notebook PySpark que reconcilie datos entre workshop.gold.dim_clientes y workshop.gold.fact_transacciones.\n\nEl reporte de reconciliación debe incluir:\n1. Clientes en dim_clientes SIN transacciones en fact_transacciones (clientes inactivos o no migrados)\n2. customer_ids en fact_transacciones que NO existen en dim_clientes (posibles registros con datos de clientes sin enmascarar o errores de migración — riesgo de cumplimiento)\n3. Para los clientes con actividad: total de transacciones, monto total, fecha de la última transacción, canal más usado\n4. Un resumen ejecutivo: total clientes activos, inactivos, referencias rotas\n\nFormatea todos los resultados con display(). Agrega un comentario sobre las implicaciones regulatorias de las referencias rotas.", "expectedOutput": "Un notebook con 4 secciones: LEFT ANTI JOIN para inactivos, LEFT ANTI JOIN inverso para referencias rotas (~60 registros con IDs BGY-XX-*), INNER JOIN con métricas por cliente, y resumen final.", "tips": ["Este patrón es exactamente lo que necesitas para validar migraciones de core bancario a Databricks.", "Las referencias rotas en datos financieros deben reportarse al equipo de compliance — impactan los reportes regulatorios.", "La misma `fact_transacciones` alimentó el CSV del paso 2: si los números no cuadran, revisa filtros silver vs. fuente gold."], "warningNote": null}, {"id": "eng-step-4", "stepNumber": 4, "title": "Orquesta el pipeline como Job nocturno", "description": "Los pipelines bancarios deben ejecutarse antes de la apertura de los sistemas. Usa Genie Code para generar la definición del Job con el SDK de Databricks.", "prompt": "Genera el código Python usando el Databricks SDK para crear un Job de procesamiento nocturno del pipeline de pagos:\n\n1. Tarea 'ingest_bronze': ejecuta notebook /Workspace/Users/{current_user}/banco-guayaquil/01_ingest\n2. Tarea 'transform_silver': ejecuta /Workspace/Users/{current_user}/banco-guayaquil/02_transform, depende de ingest_bronze\n3. Tarea 'aggregate_gold': ejecuta /Workspace/Users/{current_user}/banco-guayaquil/03_aggregate, depende de transform_silver\n\nConfiguraciones:\n- Cluster: job cluster con Photon habilitado, 2 workers mínimo\n- Schedule: cron diario a las 03:00 UTC (antes de apertura de sistemas bancarios a las 6am local)\n- Timeout: 90 minutos por tarea (SLA de procesamiento nocturno)\n- Notificaciones: email al equipo de datos si falla cualquier tarea\n- Tags: 'criticality' = 'high', 'domain' = 'payments', 'environment' = 'production'\n\nUsa databricks.sdk.service.jobs para crear el Job.", "expectedOutput": "Código Python con WorkspaceClient() que define las 3 tareas con dependencias, schedule 3am UTC, tags de criticality, y crea el Job retornando el job_id.", "tips": ["El schedule 3am UTC suele caer en horario nocturno en Ecuador (GMT-5) — ventana típica antes del cierre contable.", "Los tags permiten filtrar Jobs por dominio en el UI de Databricks."], "warningNote": null}, {"id": "eng-step-5", "stepNumber": 5, "title": "Depura y optimiza código existente", "description": "En el día a día recibirás código de compañeros o heredarás scripts antiguos. Practica el patrón 'error → Genie Code → fix' con un script de análisis de cartera.", "prompt": "El siguiente código PySpark tiene problemas de rendimiento y bugs. Identifica TODOS los problemas considerando el contexto financiero, explica cada uno, y genera la versión corregida:\n\n```python\nfrom pyspark.sql.functions import *\n\n# Leer cartera de créditos\ndf = spark.read.table(\"workshop.gold.fact_cartera_creditos\")\n\n# Filtrar desembolsos del último trimestre\ndf_filtered = df.filter(df.disbursement_date > \"2026-01-01\")\n\n# Calcular mora por región\nresult = df_filtered.groupBy(\"country_code\").agg(\n    sum(\"outstanding_balance\").alias(\"total_cartera\"),\n    sum(when(col(\"days_past_due\") > 30, col(\"outstanding_balance\")).otherwise(0)).alias(\"cartera_vencida\"),\n    count(\"*\").alias(\"num_creditos\")\n)\n\n# Join con dimensión\ndim = spark.read.table(\"workshop.gold.dim_sucursales\")\nfinal = result.join(dim, \"country_code\")\n\n# Exportar para reporte\npdf = final.toPandas()\npdf.sort_values(\"total_cartera\", ascending=False)\n```", "expectedOutput": "Genie Code debe identificar: (1) filtro de fecha como string — puede fallar según el tipo de columna, (2) falta de broadcast hint para dim_sucursales (tabla pequeña), (3) toPandas() sin LIMIT en tabla financiera potencialmente grande, (4) el join por country_code puede generar duplicados si hay múltiples sucursales por región, (5) falta de cálculo explícito de tasa de mora (cartera_vencida / total_cartera). Versión corregida incluye todos los fixes.", "tips": ["El bug del join con dim_sucursales es especialmente importante: genera filas multiplicadas que inflan las sumas de cartera.", "En contexto regulatorio, un reporte con cartera inflada puede resultar en requerimientos de capital incorrectos."], "warningNote": null}, {"id": "eng-step-6", "stepNumber": 6, "title": "Construye un Knowledge Assistant sobre cartera", "description": "Crea un asistente que responde preguntas sobre la cartera de créditos en lenguaje natural, usando el Foundation Model API.", "prompt": "Crea un notebook que funcione como un asistente de análisis de cartera de créditos:\n\n1. Genera una función get_schema_context(catalog, schema) que retorne un string con la descripción de todas las tablas disponibles (nombre, columnas, tipos, 3 filas de ejemplo). Usa workshop.gold.\n\n2. Crea una función call_fmapi(system_prompt: str, user_message: str) que llame al Foundation Model API (endpoint 'databricks-claude-sonnet-4') usando httpx:\n   - Usa Config() del Databricks SDK para obtener host y token\n   - Retorna la respuesta como string\n\n3. Crea una función answer_question(question: str) que:\n   - Use el contexto de tablas como system prompt\n   - Pase la pregunta como user_message\n   - Retorne la respuesta del modelo\n\n4. Pruébalo con estas preguntas:\n   - '¿Cuál es la tasa de mora actual en Pichincha comparada con el resto de regiones?'\n   - '¿Qué regiones tienen mayor concentración de créditos en bucket Mayor_90?'", "expectedOutput": "Un notebook con 3 funciones y 2 llamadas de prueba. Las respuestas deben estar en español, referenciar los datos reales del catálogo workshop, y mencionar cifras concretas de mora por región.", "tips": ["Si el endpoint FMAPI no responde, verifica el nombre del modelo con el facilitador.", "Este es el patrón base para construir asistentes de datos en Databricks — aplica a cualquier dominio."], "warningNote": "Este paso requiere acceso al Foundation Model API. Si no está habilitado, el facilitador te mostrará el resultado esperado."}, {"id": "eng-step-7", "stepNumber": 7, "title": "Auto-genera documentación técnica", "description": "Los datos bancarios sin documentación crean riesgo regulatorio. Usa Genie Code para auto-generar un Data Dictionary de las tablas del workshop.", "prompt": "Genera un notebook que auto-documente todas las tablas en workshop.gold como un Data Dictionary para el equipo de riesgo y compliance:\n\n1. Para cada tabla genera:\n   - Nombre y descripción de negocio inferida del contenido\n   - Clasificación de sensibilidad: indica si contiene datos PII o financieros sensibles\n   - Tabla de columnas: nombre, tipo, nullable, descripción inferida, ejemplo de valor\n   - Estadísticas: row count, rango de fechas, valores únicos en columnas clave\n   - Relaciones identificadas: foreign keys hacia otras tablas\n\n2. Formatea todo como markdown limpio exportable a Confluence.\n\n3. Genera un índice final:\n| Tabla | Filas | Columnas | Sensibilidad | Descripción |", "expectedOutput": "Un Data Dictionary completo para las 5 tablas. dim_clientes y fact_transacciones deben marcarse como 'Alta sensibilidad — PII'. El índice sirve como tabla de contenidos para Confluence.", "tips": ["Este output se puede copiar directamente a la página de Data Lineage del equipo de Governance.", "Ejecuta este notebook cada trimestre para mantener la documentación actualizada para auditorías externas."], "warningNote": null}, {"id": "eng-step-8", "stepNumber": 8, "title": "Reflexión: ¿dónde aplicas esto mañana?", "description": "Último paso. Piensa en tu trabajo actual y escribe en una celda markdown las respuestas a estas preguntas. Las compartirás con tu grupo.", "prompt": null, "expectedOutput": null, "tips": ["1. ¿Qué pipeline de ingesta del core bancario podrías construir más rápido con Genie Code esta semana?", "2. ¿Qué 'skill' de Genie Code crearías para que tu equipo estandarice el logging de pipelines financieros?", "3. Si pudieras automatizar UN proceso batch nocturno con Genie Code, ¿cuál sería?", "4. ¿Qué parte del flujo dejarías en PySpark+Genie (prototipo) y cuál pasarías a Lakeflow SDP (`sdp-workshop/`) para gobierno y expectativas?"], "warningNote": null}], "faq": [{"question": "Genie Code no genera código, ¿qué hago?", "answer": "Verifica que tienes un cluster activo asignado al notebook (esquina superior derecha). Si el cluster está iniciando, espera 1-2 minutos."}, {"question": "El código generado tiene errores al ejecutar", "answer": "Copia el error completo y pégalo en Genie Code: 'Este código tiene un error: [error]. Corrígelo manteniendo la misma lógica.'"}, {"question": "No tengo acceso al catálogo workshop", "answer": "Avisa al facilitador. Necesitas permisos de USE CATALOG y SELECT en workshop.gold."}, {"question": "No encuentro el CSV del paso 2 (medallión transacciones)", "answer": "El facilitador debe ejecutar `generate_workshop_data.py` hasta el final: crea `/Volumes/workshop/ingest/raw/transacciones_core/transacciones_nuevas.csv` (export de `workshop.gold.fact_transacciones`) y los esquemas `workshop.bronze` y `workshop.silver`. Necesitas READ FILES sobre el volumen `workshop.ingest.raw`."}, {"question": "El Foundation Model API no responde (Step 6)", "answer": "Verifica que el endpoint se llama 'databricks-claude-sonnet-4'. Si no funciona, el facilitador tiene un notebook de respaldo con el output esperado."}, {"question": "¿Puedo usar estos prompts con mis propias tablas de producción?", "answer": "Sí. Cambia 'workshop.gold' por tu catálogo y schema de producción. Los patrones PySpark y los TBLPROPERTIES funcionan igual."}]}, {"id": "bi-analytics", "title": "BI & Analytics", "subtitle": "Del reporte al insight de cartera en minutos", "description": "Genera SQL desde lenguaje natural, traduce medidas DAX a SQL, construye Metric Views para KPIs bancarios (NPL, mora, captaciones), configura Genie Spaces para analistas de riesgo, y crea dashboards — todo con Genie Code.", "icon": "📊", "color": "#004A98", "estimatedMinutes": 105, "participantCount": 0, "steps": [{"id": "bi-step-1", "stepNumber": 1, "title": "De lenguaje natural a SQL", "description": "Abre un notebook y activa Genie Code. Practica generar queries de análisis de cartera desde preguntas en español.", "prompt": "Escribe una consulta SQL que responda: ¿Cuáles son los 10 regiones con mayor cartera de créditos activa y cuál es su tasa de mora?\n\nUsa las tablas workshop.gold.fact_cartera_creditos y workshop.gold.dim_clientes.\nIncluye: country_code, cartera total vigente (outstanding_balance donde status = 'Vigente'), cartera vencida (days_past_due > 30), tasa de mora (cartera_vencida / cartera_total), número de créditos activos, y el porcentaje que representa cada región de la cartera consolidada.\nOrdena por cartera total descendente.", "expectedOutput": "Una consulta SQL con GROUP BY country_code, window function para porcentaje del total, y filtro de status. Los primeros resultados deberían ser Panamá y Costa Rica (mayor portafolio). La tasa de mora más alta debería estar en Guatemala u Guayas.", "tips": ["Mientras más específico seas sobre las columnas y las condiciones (status='Vigente', DPD>30), mejor será el SQL generado.", "Prueba variar la pregunta: agrega filtros por segmento, cambia el umbral de DPD, pide ranking por tasa de mora en lugar de cartera."], "warningNote": null}, {"id": "bi-step-2", "stepNumber": 2, "title": "Traduce DAX a Databricks SQL", "description": "Si el equipo de BI usa Power BI, probablemente tienen medidas DAX de reporting regulatorio. Usa Genie Code para migrarlas a SQL.", "prompt": "Traduce la siguiente medida DAX de reporting de cartera a Databricks SQL equivalente:\n\n```\nTasa Mora YoY Delta = \n  VAR MoraActual = \n    CALCULATE(\n      DIVIDE(\n        SUMX(FILTER(fact_cartera_creditos, fact_cartera_creditos[days_past_due] > 30), fact_cartera_creditos[outstanding_balance]),\n        SUM(fact_cartera_creditos[outstanding_balance])\n      ),\n      DATESINPERIOD(dim_fecha[Date], MAX(dim_fecha[Date]), -3, MONTH)\n    )\n  VAR MoraAnterior = \n    CALCULATE(\n      DIVIDE(\n        SUMX(FILTER(fact_cartera_creditos, fact_cartera_creditos[days_past_due] > 30), fact_cartera_creditos[outstanding_balance]),\n        SUM(fact_cartera_creditos[outstanding_balance])\n      ),\n      SAMEPERIODLASTYEAR(DATESINPERIOD(dim_fecha[Date], MAX(dim_fecha[Date]), -3, MONTH))\n    )\n  RETURN\n    MoraActual - MoraAnterior\n```\n\nUsa workshop.gold.fact_cartera_creditos. La consulta debe calcular el delta YoY en la tasa de mora (en puntos porcentuales) por región (country_code).", "expectedOutput": "Una consulta SQL con CTEs o subconsultas para período actual y anterior, usando DATE_ADD/INTERVAL de Databricks SQL. Calcula la diferencia en puntos porcentuales de la tasa de mora YoY por country_code.", "tips": ["Este patrón es clave para migrar reportes regulatorios de Power BI a Databricks SQL.", "Genie Code entiende DAX y puede traducir medidas complejas — pega medidas reales de tus reportes de supervisión."], "warningNote": null}, {"id": "bi-step-3", "stepNumber": 3, "title": "Crea Metric Views para KPIs bancarios", "description": "Las Metric Views son la nueva capa semántica de Unity Catalog. Define los KPIs de cartera una vez y que cualquier herramienta los consuma.", "prompt": "Genera la definición completa de dos Metric Views en YAML:\n\n**Metric View 1: npl_ratio_by_country**\n- Tabla fuente: workshop.gold.fact_cartera_creditos\n- Medida: SUM(outstanding_balance WHERE days_past_due > 30) / SUM(outstanding_balance) — tasa de mora\n- Dimensiones: country_code, product_type, dpd_bucket, disbursement_date\n- Filtros: country_code, product_type, rango de fechas\n- Granularidad temporal: mensual y trimestral\n\n**Metric View 2: new_disbursements_monthly**\n- Tabla fuente: workshop.gold.fact_kpis_diarios\n- Medida: SUM(new_disbursements)\n- Dimensiones: country_code, kpi_date\n- Filtros: country_code, rango de fechas\n\nTambién genera los comandos SQL CREATE METRIC VIEW para registrarlas en Unity Catalog.", "expectedOutput": "Dos definiciones YAML (npl_ratio_by_country, new_disbursements_monthly) y sus comandos CREATE METRIC VIEW. La medida de NPL usa conditional aggregation (SUM con CASE WHEN).", "tips": ["Las Metric Views reemplazan las medidas DAX como capa semántica. Una vez creadas, Genie Spaces y dashboards las consumen directamente.", "El NPL ratio definido aquí puede ser el mismo que usa el equipo de Riesgo para el reporte a la Superintendencia."], "warningNote": "Metric Views puede requerir un workspace con la feature habilitada. Si el CREATE falla, el YAML sigue siendo útil como documentación de la definición oficial del KPI."}, {"id": "bi-step-4", "stepNumber": 4, "title": "Configura un Genie Space para analistas de riesgo", "description": "Un Genie Space permite que los analistas de riesgo hagan preguntas sobre la cartera en lenguaje natural, sin escribir SQL.", "prompt": "Genera la configuración completa para un Genie Space de 'Análisis de Cartera y Riesgo Crediticio' para el equipo de riesgo de Banco Guayaquil:\n\n1. **Instrucciones del Space** (system instructions en español):\n   - Contexto: datos de cartera de créditos de Banco Guayaquil en 8 regiones de Ecuador (GY, PI, AZ, MN, OR, ES, LO, SD)\n   - Tablas disponibles y qué contiene cada una\n   - Reglas: responder siempre en español, usar USD, NO responder sobre datos individuales de clientes (privacidad), NO exponer credit_score ni outstanding_balance individuales\n   - Definición de KPIs clave: tasa de mora = créditos con DPD>30 / cartera total\n   - Preguntas que el space NO puede responder: saldos individuales, datos personales de clientes\n\n2. **5 preguntas de ejemplo** relevantes para un analista de riesgo bancario\n\n3. **Los GRANT statements** para el grupo 'risk_analysts' sobre las tablas necesarias", "expectedOutput": "Instrucciones con contexto bancario de Banco Guayaquil, restricciones de privacidad explícitas, 5 preguntas de ejemplo (como '¿Cuál es la cartera vencida total en Guayas este trimestre?' o '¿Qué producto tiene mayor tasa de mora en Pichincha?'), y los GRANTs sobre fact_cartera_creditos y fact_kpis_diarios.", "tips": ["Las instrucciones del Genie Space son como las 'workspace instructions' — moldean el comportamiento del asistente.", "La restricción de no exponer datos individuales es crucial en banca: protege el secreto bancario y cumple con regulaciones de privacidad."], "warningNote": null}, {"id": "bi-step-5", "stepNumber": 5, "title": "AI Functions en SQL", "description": "Databricks SQL tiene funciones de IA integradas (ai_query, ai_classify, ai_extract) que puedes usar directamente en queries de análisis.", "prompt": "Genera 3 consultas SQL que usen AI Functions sobre los datos del workshop:\n\n1. **ai_classify**: Clasifica el riesgo de transacciones en fact_transacciones como 'Alto Riesgo', 'Riesgo Moderado', o 'Normal' basándose en amount, channel, y transaction_type. Usa LIMIT 500 para la demo.\n\n2. **ai_extract**: De los loan_id en fact_cartera_creditos (formato BGY-{REG}-{TIPO}-{NUM}), extrae el código de región (country_code) y el tipo de producto como columnas separadas.\n\n3. **ai_query**: Para cada región (country_code) en fact_kpis_diarios, genera un párrafo ejecutivo de 2 oraciones sobre el estado de su cartera crediticia en el último mes (basándose en npl_ratio, new_disbursements, y yoy_portfolio_growth).\n\nUsa el endpoint 'databricks-claude-sonnet-4' donde se requiera especificar modelo.", "expectedOutput": "3 consultas SQL funcionales con ai_classify(), ai_extract(), y ai_query(). El ai_extract en loan_id produce dos nuevas columnas. El ai_query genera resúmenes ejecutivos en español por región.", "tips": ["Las AI Functions consumen tokens del Foundation Model API — no las ejecutes sobre tablas completas en producción sin LIMIT.", "ai_extract sobre loan_id es especialmente útil cuando los IDs codifican información de negocio — muy común en banca."], "warningNote": "Las AI Functions requieren un SQL Warehouse con Foundation Model API habilitado. Si no funciona, el facilitador mostrará los resultados esperados."}, {"id": "bi-step-6", "stepNumber": 6, "title": "Genera un dashboard de riesgo crediticio", "description": "Usa Genie Code para generar las queries de un dashboard de riesgo que podrías desplegar en Lakeview con un click.", "prompt": "Genera las consultas SQL para un dashboard de riesgo crediticio con estos 6 paneles:\n\n1. **KPI Cards** (fila superior): Cartera total vigente, Tasa de mora consolidada, Nuevos desembolsos (últimos 30 días), Cobertura de provisiones — con delta vs. período anterior (30 días)\n\n2. **Line chart**: Evolución mensual de tasa de mora por región (top 4 regiones, últimos 12 meses)\n\n3. **Bar chart**: Top 10 clientes por saldo en bucket Mayor_90 (cartera de alto riesgo)\n\n4. **Pie chart**: Distribución de cartera total por producto (Consumo, Hipoteca, Vehículo, Comercial, Tarjeta)\n\n5. **Table**: Resumen ejecutivo por región — cartera total, cartera vencida (DPD>30), tasa de mora, nuevos desembolsos, cobertura de provisiones\n\n6. **Heatmap**: Tasa de mora por región × segmento de cliente (para identificar concentraciones de riesgo)\n\nUsa workshop.gold.* tables. Incluye los alias descriptivos en cada query.", "expectedOutput": "6 consultas SQL listas para copiar en un dashboard Lakeview. El heatmap usa GROUP BY country_code, segment con la tasa de mora calculada como métrica central.", "tips": ["Puedes crear el dashboard en Databricks: New → Dashboard Lakeview y pegar estas queries directamente.", "Este dashboard cubre los KPIs del reporte mensual de cartera que pide la Superintendencia por región."], "warningNote": null}, {"id": "bi-step-7", "stepNumber": 7, "title": "Genie Supervisor: conecta múltiples spaces", "description": "Un Genie Supervisor puede orquestar múltiples Genie Spaces para responder preguntas que cruzan dominios (cartera + transacciones + KPIs).", "prompt": "Explica y genera la configuración para un Genie Supervisor que conecte 3 Genie Spaces:\n\n1. Space 'Cartera Créditos': tablas fact_cartera_creditos, dim_clientes\n2. Space 'Transacciones': tablas fact_transacciones, dim_sucursales\n3. Space 'KPIs Ejecutivos': tabla fact_kpis_diarios\n\nEl Supervisor debe:\n- Determinar automáticamente qué Space(s) consultar según la pregunta\n- Combinar resultados si la pregunta cruza dominios\n- Responder en español, sin exponer datos individuales de clientes\n\nGenera las instrucciones del Supervisor y un ejemplo de cómo respondería a: '¿Hay correlación entre el crecimiento de transacciones por App y la reducción de mora en El Oro en el último semestre?'", "expectedOutput": "Instrucciones del Supervisor con lógica de routing entre los 3 spaces, y un ejemplo de respuesta que combina datos de Transacciones y KPIs para la pregunta cruzada sobre El Oro.", "tips": ["El Genie Supervisor es el patrón ideal para analistas que necesitan respuestas que cruzan dominios sin conocer las tablas subyacentes.", "En Banco Guayaquil, un Supervisor podría combinar datos de cartera, transacciones, y KPIs regulatorios en una sola pregunta."], "warningNote": null}, {"id": "bi-step-8", "stepNumber": 8, "title": "Reflexión: ¿dónde aplicas esto mañana?", "description": "Último paso. Piensa en tu trabajo actual y escribe las respuestas para compartir con tu grupo.", "prompt": null, "expectedOutput": null, "tips": ["1. ¿Qué reporte regulatorio o de riesgo podrías generar más rápido con Genie Code?", "2. ¿Qué Genie Space sería más valioso para tus analistas de negocio o de riesgo?", "3. ¿Qué KPI bancario traducirías primero a una Metric View oficial en Unity Catalog?"], "warningNote": null}], "faq": [{"question": "¿Puedo ejecutar SQL directamente en un notebook?", "answer": "Sí. Crea una celda y escribe %sql al inicio, o crea un notebook de tipo SQL directamente desde el workspace."}, {"question": "Las AI Functions (ai_query, ai_classify) no funcionan", "answer": "Necesitas un SQL Warehouse con Foundation Model API habilitado. Pregunta al facilitador cuál warehouse usar para el workshop."}, {"question": "¿Cómo creo un Genie Space?", "answer": "Ve a la barra lateral → New → Genie Space. Pega las instrucciones y sample questions del Step 4, y agrega las tablas de workshop.gold."}, {"question": "El SQL generado tiene errores de sintaxis", "answer": "Copia el error y pégalo en Genie Code: 'Esta consulta tiene un error: [error]. Corrígela para Databricks SQL.'"}, {"question": "¿Puedo usar estas queries con mis tablas de producción?", "answer": "Sí. Cambia workshop.gold por tu catálogo y schema real. Los patrones SQL y las definiciones de KPI son portables."}]}, {"id": "data-science", "title": "Data Science & ML", "subtitle": "Del modelo a la decisión crediticia", "description": "Usa Genie Code para hacer EDA de cartera, construir features de scoring crediticio, entrenar con MLflow, desplegar a Model Serving, escalar por región/segmento con applyInPandas, y detectar transacciones sospechosas con FMAPI.", "icon": "🧠", "color": "#7C3AED", "estimatedMinutes": 105, "participantCount": 0, "steps": [{"id": "ds-step-1", "stepNumber": 1, "title": "EDA automatizado de cartera de créditos", "description": "Usa Genie Code para generar un análisis exploratorio completo de la cartera.", "prompt": "Haz un análisis exploratorio completo de workshop.gold.fact_cartera_creditos:\n\n1. Estadísticas descriptivas de todas las columnas numéricas\n2. Distribución de outstanding_balance con histograma (Plotly)\n3. Gráfico de barras: distribución de créditos por dpd_bucket (Al_Dia, 1-30, 31-60, 61-90, Mayor_90)\n4. Heatmap de correlación entre variables numéricas\n5. Boxplot de outstanding_balance por product_type\n6. Serie temporal: volumen de nuevos créditos desembolsados por mes y región\n\nUsa colores: azul primario #004A98 para la serie principal, azul secundario #38A3DD para la secundaria, fondo oscuro para los charts donde aplique.", "expectedOutput": "6 visualizaciones Plotly inline. La distribución de DPD bucket muestra ~75% Al_Dia, ~12% en 1-30, y el resto distribuido en mora. La correlación muestra relación entre original_amount y outstanding_balance.", "tips": ["Este notebook de EDA es reutilizable — cámbialo a cualquier tabla de cartera de producción.", "La distribución por DPD bucket es el primer diagnóstico de salud de la cartera — compárala contra los benchmarks del sector."], "warningNote": null}, {"id": "ds-step-2", "stepNumber": 2, "title": "Feature engineering para scoring crediticio", "description": "Genera el pipeline de features para predecir si un crédito entrará en mora en los próximos 30 días.", "prompt": "Crea un pipeline de feature engineering en PySpark para predecir si un crédito entrará en mora (days_past_due > 30) en los próximos 30 días:\n\n1. Lee workshop.gold.fact_cartera_creditos y filtra status = 'Vigente'\n2. Genera estas features:\n   - loan_age_days: días transcurridos desde disbursement_date hasta hoy\n   - months_to_maturity: meses restantes hasta maturity_date\n   - balance_ratio: outstanding_balance / original_amount (qué tan pagado está)\n   - payment_burden: monthly_payment / outstanding_balance (carga mensual relativa)\n   - is_high_risk_country: 1 si country_code en ('OR', 'LO', 'ES', 'MN'), 0 si no\n   - country_avg_npl: promedio de days_past_due de todos los créditos del mismo country_code (región)\n   - product_default_rate: tasa de mora histórica del mismo product_type\n3. Target variable: label = 1 si days_past_due > 30, 0 si no\n4. Split temporal: train = créditos desembolsados antes de 2025-07-01, test = desde 2025-07-01\n5. Muestra la distribución del target (balance de clases — crítico en scoring crediticio)", "expectedOutput": "Pipeline con window functions de PySpark para country_avg_npl y product_default_rate. La distribución del target muestra aproximadamente 15-22% de créditos en mora (desbalance de clases — habrá que manejarlo en el entrenamiento).", "tips": ["El split temporal (no aleatorio) es OBLIGATORIO en scoring crediticio — nunca uses datos futuros para entrenar.", "El desbalance de clases (~80/20) es normal en banca — lo manejaremos con scale_pos_weight en XGBoost."], "warningNote": null}, {"id": "ds-step-3", "stepNumber": 3, "title": "Entrena y registra el modelo con MLflow", "description": "Entrena un clasificador de riesgo crediticio y regístralo en MLflow con artefactos para auditoría regulatoria.", "prompt": "Entrena un XGBClassifier para predecir mora crediticia y regístralo en MLflow:\n\n1. Configura el experiment: '/workshop/credit-scoring-bg'\n2. Calcula scale_pos_weight = n_negativos / n_positivos para manejar el desbalance\n3. Dentro de un mlflow.start_run():\n   - Log params: n_estimators=200, max_depth=5, learning_rate=0.05, scale_pos_weight calculado\n   - Fit el modelo en train\n   - Evalúa en test: AUC-ROC, Gini (2*AUC-1), KS Statistic, Precision, Recall, F1\n   - Log todas las métricas\n   - Log el modelo con mlflow.sklearn.log_model\n   - Log la curva ROC como artefacto PNG\n   - Set tags: domain='credit-risk', country='CONSOLIDADO', regulation='supervisory'\n4. Registra el modelo en Unity Catalog: workshop.gold.credit_scoring_bg\n5. Muestra la curva ROC y las top 10 feature importances\n\nColorea la curva ROC con #004A98 (azul corporativo).", "expectedOutput": "MLflow run con AUC-ROC esperado >0.75 y Gini >0.50. La curva ROC se logea como artefacto PNG. Feature importances muestran balance_ratio y loan_age_days como las más importantes.", "tips": ["El patrón mlflow.start_run() → log_params → log_metrics → log_model es el estándar para modelos en producción.", "El tag 'regulation' = 'supervisory' señala que este modelo requiere documentación para posible revisión de la Superintendencia."], "warningNote": null}, {"id": "ds-step-4", "stepNumber": 4, "title": "Evalúa y compara modelos", "description": "En scoring crediticio, la elección del modelo tiene implicaciones regulatorias. Compara tres variantes y analiza el trade-off entre performance y complejidad.", "prompt": "Genera un notebook que compare 3 variantes del modelo de scoring crediticio:\n\n1. Modelo A: XGBClassifier(n_estimators=100, max_depth=3) — simple, fácil de explicar\n2. Modelo B: XGBClassifier(n_estimators=200, max_depth=5) — estándar\n3. Modelo C: XGBClassifier(n_estimators=500, max_depth=7, subsample=0.8) — complejo\n\nPara cada modelo:\n- Entrena y evalúa con el mismo split temporal\n- Calcula: AUC-ROC, Gini, KS Statistic, Precision@top10pct (de los créditos con mayor score, ¿qué % realmente entra en mora?)\n- Log a MLflow en el mismo experiment\n\nTabla comparativa: modelo, AUC, Gini, KS, Precision@top10, overfitting_gap (AUC_train - AUC_test)\n\nAl final, incluye una discusión: ¿cuál elegirías para producción considerando que la Superintendencia puede pedir explicar las decisiones del modelo?", "expectedOutput": "3 MLflow runs con métricas bancarias (Gini y KS además de AUC). La tabla comparativa muestra el overfitting gap del modelo C. La discusión menciona el trade-off entre performance y explicabilidad regulatoria.", "tips": ["En contexto regulatorio (SUGEF, Superintendencia Financiera), los modelos más simples pueden ser preferibles si el regulador pide explicar decisiones.", "El KS Statistic es el métrico estándar en scoring crediticio bancario — debe ser >0.30 para considerar el modelo útil."], "warningNote": null}, {"id": "ds-step-5", "stepNumber": 5, "title": "Despliega a Model Serving", "description": "Toma el mejor modelo y despliégalo como un endpoint REST que el sistema de originación pueda llamar en tiempo real.", "prompt": "Genera el código para desplegar el mejor modelo de scoring a un endpoint de Model Serving:\n\n1. Busca el run con mayor AUC-ROC en el experiment '/workshop/credit-scoring-bg'\n2. Promueve ese modelo como 'Champion' en el Model Registry\n3. Crea el serving endpoint con Databricks SDK:\n   - Nombre: workshop-credit-score-bg\n   - Tipo: serverless\n4. Genera un request de prueba con un cliente representativo (incluye todas las features del Step 2)\n5. Muestra cómo llamar el endpoint desde Python\n6. Genera una Model Card básica en markdown con: propósito, variables de entrada, métricas de desempeño, limitaciones, fecha de entrenamiento, y campo 'Regulatory Review' para documentar la revisión regulatoria", "expectedOutput": "Código de deployment con WorkspaceClient(), request de prueba con features bancarias, y una Model Card en markdown con sección 'Regulatory Review' — requerimiento habitual cuando el modelo afecta decisiones crediticias.", "tips": ["El endpoint puede tardar 3-5 minutos en iniciar en cold start — es normal.", "La Model Card es documentación obligatoria en muchos marcos regulatorios si el modelo afecta acceso al crédito."], "warningNote": "Model Serving serverless puede tardar 5-10 minutos en cold-start. El facilitador tiene un endpoint pre-calentado como respaldo."}, {"id": "ds-step-6", "stepNumber": 6, "title": "Escala con applyInPandas: un modelo por región y segmento", "description": "Banco Guayaquil opera en 8 regiones de Ecuador con carteras muy diferentes. Entrena un modelo específico por región × segmento en paralelo.", "prompt": "Genera un notebook que entrene un modelo de scoring POR REGIÓN Y SEGMENTO usando applyInPandas:\n\n1. Lee workshop.gold.fact_cartera_creditos + workshop.gold.dim_clientes y genera las features del Step 2 para TODOS los créditos\n2. Define una función train_scoring_model(pdf: pd.DataFrame) que:\n   - Recibe datos de UN grupo (country_code + segment)\n   - Genera features, split temporal, entrena XGBoost con scale_pos_weight\n   - Log a MLflow con tags region (country_code) y segment\n   - Retorna DataFrame con: country_code, segment, auc_roc, gini, ks, n_loans, n_defaults, run_id\n3. Aplica con: df.groupBy('country_code', 'segment').applyInPandas(train_scoring_model, schema=result_schema)\n4. Filtra grupos con al menos 30 créditos (mínimo estadístico)\n5. Muestra tabla de resultados y heatmap de AUC por región × segmento", "expectedOutput": "Notebook que entrena múltiples modelos en paralelo. La tabla muestra métricas por región/segmento. El heatmap revela qué combinaciones son más predecibles — esperar que Corporativo tenga AUC más alto que Retail.", "tips": ["applyInPandas distribuye el entrenamiento — 20 modelos toman casi lo mismo que 1.", "Este patrón permite que cada región/segmento tenga su modelo calibrado a su propia dinámica de mora."], "warningNote": null}, {"id": "ds-step-7", "stepNumber": 7, "title": "Detección de transacciones sospechosas con FMAPI", "description": "Usa Genie Code para generar un notebook de detección de transacciones anómalas — el primer paso de un pipeline SARLAFT/SAGRILAFT.", "prompt": "Genera un notebook de detección de transacciones sospechosas usando el Foundation Model API:\n\n1. Crea una función analyze_customer_transactions(customer_id: str) que:\n   - Lea las transacciones del cliente desde fact_transacciones\n   - Llame al FMAPI con un prompt que evalúe si alguna transacción parece sospechosa (patrones: monto inusual para el cliente, cambio repentino de canal, horario atípico)\n   - Clasifique cada transacción como 'Normal', 'Sospechosa', o 'Potencial Fraude'\n   - Retorne el resultado con justificación\n\n2. Aplica sobre una muestra de 50 clientes\n\n3. Genera un reporte: customer_id, n_transacciones_revisadas, n_sospechosas, n_fraude_potencial, detalle\n\n4. Guarda el reporte en workshop.gold.alertas_sarlaft_review\n\nNota: en producción, este output alimentaría el sistema de gestión de alertas SARLAFT.", "expectedOutput": "Notebook que procesa transacciones por cliente vía FMAPI y genera un reporte de alertas. Transacciones con amount > 3σ del cliente o cambio repentino de canal serán marcadas como sospechosas.", "tips": ["SARLAFT en Ecuador requiere sistemas de monitoreo de transacciones — este es el prototipo.", "En producción, combinarías reglas determinísticas (umbrales) con el análisis semántico del FMAPI para reducir falsos positivos."], "warningNote": "Este step genera alertas ficticias — los datos son sintéticos. No interpretes los resultados como reales."}, {"id": "ds-step-8", "stepNumber": 8, "title": "Reflexión: ¿dónde aplicas esto mañana?", "description": "Último paso. Piensa en tus proyectos actuales y cómo Genie Code cambia tu flujo de trabajo.", "prompt": null, "expectedOutput": null, "tips": ["1. ¿Qué modelo en tu backlog (scoring, fraude, churn) podrías prototipar más rápido con Genie Code?", "2. ¿Cómo integrarías el scoring model con el sistema de originación de crédito actual?", "3. ¿Qué 'skill' de Genie Code crearías para que tu equipo estandarice la Model Card y la documentación regulatoria?"], "warningNote": null}], "faq": [{"question": "El AUC-ROC del modelo es bajo (<0.65)", "answer": "Verifica que el split es temporal (no aleatorio) y que las features de lag/window se calcularon correctamente. Un AUC bajo también puede indicar que los datos sintéticos del workshop no tienen suficiente señal — en producción con datos reales los resultados mejoran."}, {"question": "MLflow no encuentra el experiment", "answer": "El experiment se crea automáticamente con mlflow.set_experiment(). Verifica que el path comienza con '/workshop/'."}, {"question": "Model Serving tarda mucho en iniciar", "answer": "Es normal — serverless puede tardar 5-10 minutos en cold-start. Mientras tanto, avanza al Step 6 (applyInPandas)."}, {"question": "applyInPandas falla con error de schema", "answer": "El schema del resultado debe coincidir exactamente con lo que retorna la función. Verifica que retornas un DataFrame con las columnas: country_code, segment, auc_roc, gini, ks, n_loans, n_defaults, run_id."}, {"question": "¿Qué es el KS Statistic y cómo se interpreta?", "answer": "El KS (Kolmogorov-Smirnov) mide la separación máxima entre la distribución de scores de buenos y malos pagadores. Un KS >0.30 es aceptable, >0.40 es bueno en scoring bancario."}]}, {"id": "data-governance", "title": "Data Governance", "subtitle": "Calidad, seguridad y cumplimiento regulatorio", "description": "Genera checks de calidad para reportes regulatorios, crea frameworks DQ reutilizables con impacto regulatorio, implementa políticas CLS/RLS para datos financieros sensibles (SARLAFT, Superintendencia), y produce materiales de Data Academy — todo con Genie Code.", "icon": "🛡️", "color": "#0891B2", "estimatedMinutes": 105, "participantCount": 0, "steps": [{"id": "gov-step-1", "stepNumber": 1, "title": "Genera checks de calidad para datos regulatorios", "description": "Los datos bancarios tienen reglas de calidad específicas que impactan el cumplimiento regulatorio. Usa Genie Code para generar las funciones de validación.", "prompt": "Genera funciones PySpark de data quality para validaciones bancarias:\n\n1. **check_nulls(df, columns: list)** → Para cada columna, cuenta los NULLs y su porcentaje sobre el total\n2. **check_duplicates(df, key_columns: list)** → Cuenta filas duplicadas en la clave indicada\n3. **check_referential_integrity(df, fk_col, ref_df, pk_col)** → Cuenta FKs sin match en la tabla de referencia\n4. **check_value_range(df, col, min_val, max_val)** → Cuenta valores fuera del rango permitido\n5. **check_dpd_consistency(df)** → Valida que el dpd_bucket en fact_cartera_creditos es consistente con days_past_due:\n   - Al_Dia: days_past_due = 0\n   - 1-30: 1 <= days_past_due <= 30\n   - 31-60: 31 <= days_past_due <= 60\n   - 61-90: 61 <= days_past_due <= 90\n   - Mayor_90: days_past_due > 90\n\nCada función retorna: check_name, table_name, status ('PASS'/'FAIL'/'WARN'), metric, detail, regulatory_impact ('None'/'Low'/'High').\n\nPrueba cada función contra workshop.gold.fact_cartera_creditos.", "expectedOutput": "5 funciones PySpark con el campo regulatory_impact. Al probarlas, detectan: ~5 NULL interest_rate, ~8 DPD negativos, ~12 dpd_bucket inconsistentes, ~4 fechas de madurez anteriores al desembolso — defectos que impactarían el reporte regulatorio de cartera.", "tips": ["El check_dpd_consistency es específico de banca — una inconsistencia entre DPD y bucket hace que el reporte de mora a la Superintendencia sea incorrecto.", "El regulatory_impact='High' en un FAIL debería disparar una alerta al equipo de compliance."], "warningNote": null}, {"id": "gov-step-2", "stepNumber": 2, "title": "Profiling automatizado de tablas financieras", "description": "Ejecuta un profiling completo que descubra todos los problemas de calidad inyectados en las tablas del workshop.", "prompt": "Crea un notebook de profiling automático de TODAS las tablas en workshop.gold, orientado a auditoría bancaria:\n\nPara cada tabla muestra:\n1. Row count y estimación de tamaño\n2. Columnas con NULLs (conteo y % — umbral WARN si >1%, FAIL si >5%)\n3. Duplicados en la primary key inferida (columna que termina en _id)\n4. Para columnas numéricas: min, max, mean, stddev, outliers (>3σ)\n5. Para columnas de fecha: rango, fechas futuras, fechas imposibles (antes de 1990 para créditos)\n6. Para columnas categóricas: valores únicos, top 5, inconsistencias de capitalización\n7. **Clasificación PII**: marca las columnas que contienen datos personales o financieros sensibles\n\nScorecard final:\n| Tabla | Checks | Passed | Failed | Score DQ (%) | Nivel Sensibilidad |", "expectedOutput": "Profiling que detecta los ~382 defectos inyectados. El scorecard incluye 'Nivel Sensibilidad' marcando dim_clientes como 'PII-Alto' y fact_transacciones como 'Financiero-Alto'. Ninguna tabla debería llegar al 100% de Score DQ.", "tips": ["Este notebook es el primer paso de cualquier auditoría de datos — úsalo antes de un reporte regulatorio.", "Los defectos encontrados son representativos de problemas reales en datos de core bancario — NULLs, duplicados, inconsistencias de capitalización."], "warningNote": null}, {"id": "gov-step-3", "stepNumber": 3, "title": "Framework DQ configurable con impacto regulatorio", "description": "Crea un framework donde las reglas se definen en un diccionario y un runner las ejecuta todas, tagging el impacto regulatorio de cada falla.", "prompt": "Crea un framework de data quality para reportes regulatorios bancarios:\n\n1. **Configuración de reglas** (diccionario Python):\n```python\ndq_rules = {\n    'dim_clientes': [\n        {'check': 'nulls', 'columns': ['country_code', 'segment', 'risk_profile'], 'regulatory_impact': 'High'},\n        {'check': 'duplicates', 'key_columns': ['customer_id'], 'regulatory_impact': 'High'},\n        {'check': 'value_range', 'col': 'credit_score', 'min': 300, 'max': 850, 'regulatory_impact': 'Low'},\n    ],\n    'fact_cartera_creditos': [\n        {'check': 'nulls', 'columns': ['loan_id', 'customer_id', 'disbursement_date', 'interest_rate'], 'regulatory_impact': 'High'},\n        {'check': 'value_range', 'col': 'days_past_due', 'min': 0, 'max': 3650, 'regulatory_impact': 'High'},\n        {'check': 'referential_integrity', 'fk_col': 'customer_id', 'ref_table': 'dim_clientes', 'pk_col': 'customer_id', 'regulatory_impact': 'High'},\n        {'check': 'dpd_consistency', 'regulatory_impact': 'High'},\n    ],\n    # ... + reglas para las 3 tablas restantes\n}\n```\n\n2. **Runner** — función run_all_checks(dq_rules, catalog, schema) que retorne DataFrame Spark con: run_id (UUID), run_timestamp, table_name, check_name, status, metric, detail, regulatory_impact\n\nIncluye reglas para las 5 tablas (mínimo 3 por tabla = 15+ reglas totales).\nEjecuta y muestra los resultados con display().", "expectedOutput": "Diccionario con 15+ reglas incluyendo el campo regulatory_impact, y un runner que produce un DataFrame con todos los resultados. Al ejecutar, múltiples FAILs con regulatory_impact='High' — estos son los que deben escalarse a compliance.", "tips": ["Este framework es production-ready: cambia el diccionario para tus tablas reales y tienes DQ automatizado.", "Los FAILs con regulatory_impact='High' deberían bloquear la generación de reportes regulatorios hasta corregirse."], "warningNote": null}, {"id": "gov-step-4", "stepNumber": 4, "title": "Scaffold de políticas CLS y RLS para datos bancarios", "description": "Genera los comandos SQL para implementar segregación de datos financieros sensibles, conforme a los requerimientos de la Superintendencia.", "prompt": "Genera los comandos SQL para políticas de seguridad en workshop.gold conformes con regulación bancaria:\n\n1. **Column-Level Security (CLS)**:\n   - Tabla dim_clientes: credit_score y risk_profile solo visibles para grupo 'risk_team'. Para otros: NULL.\n   - Tabla fact_cartera_creditos: outstanding_balance y monthly_payment visibles solo para 'credit_analysts'. Para 'compliance_team': redondear al millar más cercano (para reportes agregados).\n   - Tabla fact_transacciones: amount visible solo para 'operations_team'; para otros usuarios: 0.00 (enmascarado).\n\n2. **Row-Level Security (RLS)**:\n   - Tabla fact_cartera_creditos: cada analista ve solo créditos de su región asignada. Crea una función que mapee usuario → country_code (región).\n   - Tabla fact_kpis_diarios: misma lógica de región.\n\n3. **Tabla de mapeo**: users_country_access con columnas username, country_code, role\n\n4. **GRANT statements** necesarios para que funcione.\n\n5. **Queries de validación** que confirmen que las políticas funcionan correctamente.\n\nContexto: estas políticas implementan la segregación de información requerida por la normativa bancaria regional.", "expectedOutput": "Comandos SQL para CREATE FUNCTION (row filter), ALTER TABLE SET ROW FILTER, ALTER TABLE ALTER COLUMN SET MASK, GRANTs, y queries de validación. Comentarios explican el driver regulatorio de cada política.", "tips": ["CLS y RLS son fundamentales para cumplir con el principio de need-to-know en datos financieros sensibles.", "Una vez implementadas, Genie Spaces y dashboards respetan automáticamente estas políticas — el analista solo ve lo que le corresponde."], "warningNote": "Los comandos CLS/RLS requieren permisos de OWNER en las tablas. En el workshop, generamos el código correcto pero no lo ejecutamos."}, {"id": "gov-step-5", "stepNumber": 5, "title": "Crea un notebook de Data Academy", "description": "Genera un notebook interactivo de capacitación SQL para el programa de Data Academy del equipo de riesgo.", "prompt": "Genera un notebook interactivo de aprendizaje sobre 'Análisis de Cartera con SQL en Databricks' para el equipo de riesgo de Banco Guayaquil:\n\nEstructura:\n1. **Introducción** (markdown): qué es la tasa de mora, por qué el equipo de riesgo necesita SQL directo, beneficios vs. Excel\n2. **Lección 1 - SELECT básico**: cómo consultar la cartera activa en workshop.gold.fact_cartera_creditos\n3. **Lección 2 - Filtros y WHERE**: identificar créditos en mora por DPD bucket\n4. **Lección 3 - GROUP BY**: calcular la tasa de mora por región y producto\n5. **Lección 4 - JOIN**: cruzar datos de clientes con su cartera para ver el perfil del deudor\n6. **Quiz final**: 5 preguntas sobre escenarios reales de análisis de cartera\n\nCada lección: explicación en markdown + ejercicio con hint + solución en celda oculta.\nTodo en español. Usa workshop.gold.* tables.", "expectedOutput": "Notebook con ~20 celdas. El quiz incluye escenarios reales como '¿Cuántos clientes PYME tienen mora >60 días en Pichincha?' y '¿Cuál es el product_type con mayor outstanding_balance promedio en Panamá?'", "tips": ["Este notebook es el material de Data Academy para analistas de riesgo — puedes adaptarlo para otras áreas.", "Las preguntas del quiz cubren exactamente los análisis que el equipo hace semanalmente — después del workshop pueden hacerlo directamente en SQL."], "warningNote": null}, {"id": "gov-step-6", "stepNumber": 6, "title": "Auto-genera Data Dictionary para auditoría", "description": "Crea documentación técnica automática de las tablas del workshop para el equipo de compliance y el auditor externo.", "prompt": "Genera un notebook que auto-documente las tablas de workshop.gold como Data Dictionary para auditoría bancaria:\n\nPara cada tabla genera en markdown:\n1. **Nombre y descripción de negocio** (infiere del contenido)\n2. **Clasificación de sensibilidad**: PII-Alto, Financiero-Alto, Financiero-Medio, o Público\n3. **Owner placeholder** y fecha de última actualización\n4. **Tabla de columnas**: nombre, tipo, nullable, descripción de negocio, clasificación (PII/Financiero/Público), ejemplo de valor\n5. **Estadísticas**: row count, rango de fechas, valores únicos en columnas clave\n6. **Relaciones**: foreign keys identificadas y a qué tabla apuntan\n7. **Notas de calidad**: issues detectados en el profiling del Step 2\n\nÍndice final:\n| Tabla | Filas | Sensibilidad | Descripción | Score DQ |\n\nFormatea para Confluence.", "expectedOutput": "Data Dictionary completo para las 5 tablas con clasificación explícita. dim_clientes marcado como 'PII-Alto' (customer_name, credit_score), fact_transacciones como 'Financiero-Alto'. El índice final sirve de tabla de contenidos para el auditor.", "tips": ["Este output se puede copiar directamente a la página de Data Lineage del equipo de Governance en Confluence.", "El auditor externo suele pedir este tipo de documento — generarlo automáticamente ahorra semanas de trabajo manual."], "warningNote": null}, {"id": "gov-step-7", "stepNumber": 7, "title": "Agenda el DQ como Job regulatorio recurrente", "description": "Convierte el framework de DQ en un Job que se ejecute antes del envío de reportes regulatorios.", "prompt": "Genera el código para convertir el framework DQ del Step 3 en un Job automatizado para cumplimiento regulatorio:\n\n1. Notebook 'dq_runner_bg.py' que:\n   - Cargue las reglas del Step 3\n   - Ejecute run_all_checks()\n   - Escriba resultados en workshop.gold.dq_audit_log (modo APPEND)\n   - Si hay FAILs con regulatory_impact='High', genere un reporte de alerta en formato JSON\n   - Imprima un resumen: total checks, passed, failed por tabla y por regulatory_impact\n\n2. Código Databricks SDK para el Job:\n   - Nombre: 'Banco Guayaquil DQ Monitor Regulatorio'\n   - Schedule: diario a las 05:00 UTC (antes del envío de reportes regulatorios de apertura)\n   - Alertas: email al equipo de compliance si hay FAILs de regulatory_impact='High'\n   - Tag: 'regulatory' = 'true'\n\n3. Queries para el Comité de Riesgo:\n   - Trend semanal de Score DQ por tabla (últimas 4 semanas)\n   - Checks que pasaron de PASS a FAIL (regresiones regulatorias)\n   - Ranking de checks con un reporte regulatorio (cartera, mora, provisiones). Estos FAILs deben resolverse antes del envío a la Superintendencia."}, {"question": "¿Puedo generar notebooks de Data Academy sobre otros temas?", "answer": "Sí. Cambia el tema en el prompt del Step 5: 'Introducción a PySpark', 'Cómo usar MLflow para modelos de scoring', 'Buenas prácticas de Delta Lake para datos bancarios', etc."}]}, {"id": "sdp-lakeflow-workshop-repositorio", "strip": "sdp", "title": "Lakeflow SDP — Taller (catálogo workshop)", "subtitle": "Laboratorio Lakeflow: crear pipeline, catálogo `workshop`, variable `source`, ejecución y CDC", "description": "Pasos alineados con el laboratorio del repo: **`exercises/lakeflow-sdp/sdp-exercise-01-pipeline-calidad-datos.sql`** y **`sdp-exercise-02-cdc-produccion.py`**. Antes, el facilitador debe ejecutar **`generate_workshop_data.py`** (Run all) y aplicar **`sdp-workshop/sql/GRANTS_single_catalog.sql`**. SQL del pipeline: **`sdp-workshop/transformations/`**.", "icon": "🔷", "color": "#C2410C", "estimatedMinutes": 100, "participantCount": 0, "steps": [{"id": "sdp-step-1", "stepNumber": 1, "title": "Crear el pipeline Lakeflow (ETL)", "description": "En Databricks: **New → ETL pipeline** (Lakeflow Spark Declarative Pipeline). Elige **Add existing assets**: **Pipeline root** = carpeta del workspace donde subiste el repo (o al menos la carpeta **`transformations/`** con `orders_pipeline.sql`). En **Source code paths** incluye **`transformations`** para que el editor cargue el SQL. Pon un **nombre** al pipeline (p. ej. `SDP Workshop - [tu usuario]`). **Guarda** y abre el editor multi‑archivo.", "prompt": "Enumera en orden los clics que harías desde la barra lateral hasta ver `orders_pipeline.sql` en el explorador del pipeline. ¿Qué diferencia hay entre la carpeta raíz del proyecto y la subcarpeta `transformations/`?", "expectedOutput": "Ves el **Lakeflow Pipelines Editor** con `orders_pipeline.sql` (y aún sin `customers_pipeline.sql` si no lo has añadido).", "tips or típico: *Variable source not found* → revisa nombre de clave y que guardaste la configuración.", "Guía: lección 1 sección **D**, paso *Agregar variable de configuración*."], "warningNote": "Sin **READ FILES** sobre `workshop.ingest.raw` tu usuario fallará al leer JSON aunque la variable esté bien."}, {"id": "sdp-step-4", "stepNumber": 4, "title": "Cómputo y primera ejecución (solo pedidos)", "description": "En **Settings → Compute**, elige **Serverless** si tu workspace lo permite (recomendado). Luego **Run pipeline** (o **Start**). Observa el **DAG**: `marketplace_pedidos_raw` → `marketplace_pedidos_clean` → `fact_marketplace_pedidos_diario`. En **Tables / Table metrics**, revisa filas y expectativas de calidad en silver.", "prompt": "Tras un run exitoso, escribe la consulta SQL para contar filas en `workshop.gold.fact_marketplace_pedidos_diario` (puedes usar `SELECT COUNT(*) ...`).", "expectedOutput": "Pipeline en verde (o completado sin errores bloqueantes); puedes consultar las tres tablas en Unity Catalog y ver métricas/DQ en la UI.", "tips": ["Si solo importaste `orders_pipeline.sql`, aún no verás tablas de clientes — es normal hasta el paso 5.", "Puedes usar **Run table** en una tabla bronze para depurar sin correr todo el pipeline."], "warningNote": null}, {"id": "sdp-step-5", "stepNumber": 5, "title": "Añadir CDC: `customers_pipeline.sql` y volver a ejecutar", "description": "En el Workspace, asegúrate de tener **`customers_pipeline.sql`** (desde `sdp-workshop/transformations/`) **dentro de la misma carpeta `transformations/`** que usa el pipeline. Vuelve al pipeline: en el explorador deberías ver **dos** archivos SQL. **Run pipeline** otra vez. Valida tablas **`workshop.bronze.marketplace_clientes_cdc_raw`**, **`workshop.silver.marketplace_clientes_cdc_clean`** y **`workshop.gold.dim_marketplace_cliente`** (y la MV de resumen si aplica).", "prompt": "En 3 viñetas explica qué hace **AUTO CDC INTO** en `customers_pipeline.sql` respecto a INSERT/UPDATE/DELETE.", "expectedOutput": "El DAG incluye el flujo de clientes; `dim_marketplace_cliente` refleja el SCD1 esperado (p. ej. conteos coherentes con el laboratorio).", "tips": ["No cambies la variable **`source`**: los JSON de clientes están en **`/Volumes/workshop/ingest/raw/customers/`**.", "Guía paso a paso: `exercises/lakeflow-sdp/sdp-exercise-02-cdc-produccion.py` secciones **D** y **E**."], "warningNote": null}, {"id": "sdp-step-6", "stepNumber": 6, "title": "Verificación SQL y cierre", "description": "En un **notebook SQL** o el editor SQL, ejecuta consultas de comprobación sobre bronze/silver/gold (por ejemplo `SELECT COUNT(*)`, muestreo de `dim_marketplace_cliente`, comparación con archivos fuente). Opcional: revisa **Schedule** / **Jobs** enlazados si el laboratorio de producción aplica en tu sesión.", "prompt": "Propón **un** check de gobierno: ¿qué riesgo hay en que muchos equipos compartan el mismo pipeline escribiendo en las mismas tablas `marketplace_*` y cómo lo mitigarías?", "expectedOutput": "Consultas de verificación ejecutadas sin error; comprensión de convivencia con tablas Genie (`transacciones_*`) en el mismo catálogo.", "tips": ["El núcleo bancario sigue en `workshop.gold` (`dim_clientes`, `fact_transacciones`, …); las tablas `marketplace_*` son el módulo del taller SDP.", "Referencia de permisos: `sdp-workshop/sql/GRANTS_single_catalog.sql`."], "warningNote": null}], "faq": [{"question": "¿Dónde queda el medallón del SDP frente al de Genie?", "answer": "Ambos usan **`workshop.bronze` → `workshop.silver` → `workshop.gold`**. Genie rellena tablas como `transacciones_raw` / `transacciones_clean` / `fact_transacciones_mensual_genie` desde CSV. SDP rellena `marketplace_*` desde JSON. El núcleo bancario y la semilla `fact_pedidos_marketplace` siguen en `gold` por el generador."}, {"question": "¿Necesito CREATE CATALOG?", "answer": "No para este diseño: solo hace falta que el catálogo workshop exista y que tengas permisos de esquema/volumen según sdp-w
